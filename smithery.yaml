name: novada-mcp
description: "Real-time web data API for AI agents — search (Google, Bing), extract, crawl, and research the web. Powered by 100M+ proxy IPs across 195 countries."
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      novadaApiKey:
        type: string
        description: "Your Novada API key from https://www.novada.com"
    required:
      - novadaApiKey
  commandFunction: |
    config => ({ command: 'npx', args: ['-y', 'novada-mcp@latest'], env: { NOVADA_API_KEY: config.novadaApiKey } })
